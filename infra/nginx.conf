server {
    listen 80;
    server_name _;

    # Allow large log file uploads (matches backend 50 MB limit)
    client_max_body_size 60m;

    # React SPA — serve index.html for all unknown paths (client-side routing)
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Proxy all API routes to the backend
    location ~ ^/(auth|missions|jobs|evals|health|docs|openapi\.json|redoc|samples) {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;  # long enough for replay jobs
    }
}
